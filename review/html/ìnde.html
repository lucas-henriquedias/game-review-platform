            <div class="review-form-container">
                <h2>Deixe sua opinião</h2>
                <form th:action="@{/addReview}" th:object="${newReview}" method="POST">
                    
                    <input type="text" th:field="*{username}" placeholder="Seu nome ou apelido" required>
                    
                    <select th:field="*{rating}" required>
                        <option value="" disabled selected>Sua nota</option>
                        <option value="⭐⭐⭐⭐⭐ (5/5)">⭐⭐⭐⭐⭐ (5/5)</option>
                        <option value="⭐⭐⭐⭐ (4/5)">⭐⭐⭐⭐ (4/5)</option>
                        <option value="⭐⭐⭐ (3/5)">⭐⭐⭐ (3/5)</option>
                        <option value="⭐⭐ (2/5)">⭐⭐ (2/5)</option>
                        <option value="⭐ (1/5)">⭐ (1/5)</option>
                    </select>

                    <textarea th:field="*{reviewText}" placeholder="O que você achou do jogo?..." required></textarea>
                    
                    <button type="submit">Publicar Review</button>
                </form>
            </div>
        </main>

        <section class="reviews-section">
            <h2>Reviews da Comunidade</h2>
            
            <div class="review-list">
                <div class="review-card" th:each="review : ${reviews}">
                    <div class="review-header">
                        <span class="reviewer-name" th:text="${review.username}">Nome</span>
                        <span class="review-rating" th:text="${review.rating}">Nota</span>
                    </div>
                    <p class="review-text" th:text="${review.reviewText}">Texto do review.</p>
                </div>
            </div>
        </section>
    </div>
